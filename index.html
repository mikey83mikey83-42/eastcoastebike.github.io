<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>East Coast E-bike | Warranty Portal</title>
    <style>
        :root {
            --brand-navy: #1B365D;
            --brand-teal: #4A90A4;
            --border: #ddd;
            --bg: #f0f2f5;
            --text: #333;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 500px;
            margin: 20px auto;
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo {
            max-width: 180px;
            height: auto;
            margin-bottom: 10px;
        }

        h1 {
            color: var(--brand-navy);
            margin: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--brand-teal);
            margin-bottom: 25px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        form {
            text-align: left;
        }

        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 10px;
        }

        input:focus,
        textarea:focus,
        button:focus {
            outline: 3px solid rgba(74, 144, 164, 0.35);
            outline-offset: 2px;
            border-color: var(--brand-teal);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--brand-navy);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 20px;
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        #formStatus {
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.75rem;
            color: #888;
        }
    </style>
</head>
<body>
<div class="container">
    <img src="5483.png" alt="East Coast E-bike logo" class="logo">
    <h1>Warranty Portal</h1>
    <p class="subtitle">Bafang Authorized Service Center</p>

    <form id="warrantyForm" novalidate>
        <label for="customer_name">Full Name</label>
        <input id="customer_name" type="text" name="customer_name" autocomplete="name" required>

        <label for="email">Email Address</label>
        <input id="email" type="email" name="email" autocomplete="email" required>

        <label for="serial_number">Bafang Serial / Policy #</label>
        <input id="serial_number" type="text" name="serial_number" required>

        <label for="issue_description">Description of Fault</label>
        <textarea id="issue_description" name="issue_description" rows="4" required></textarea>

        <button type="submit" id="submitBtn">Submit Claim</button>
        <p id="formStatus" role="status" aria-live="polite"></p>
    </form>
</div>

<div class="footer">&copy; 2026 East Coast E-bike &amp; Bafang Warranty Repair</div>

<script>
    const API_URL = 'https://east-coast-ebike-warranty.onrender.com/submit-claim';
    const form = document.getElementById('warrantyForm');
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('formStatus');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        status.textContent = '';

        const data = Object.fromEntries(new FormData(form).entries());
        data.customer_name = data.customer_name.trim();
        data.email = data.email.trim();
        data.serial_number = data.serial_number.trim();
        data.issue_description = data.issue_description.trim();

        if (data.issue_description.length < 10) {
            status.textContent = 'Please provide a more detailed fault description.';
            return;
        }

        btn.disabled = true;
        btn.innerText = 'Processing...';

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
                signal: controller.signal
            });

            clearTimeout(timeout);

            if (response.ok) {
                status.textContent = 'Success! Your claim has been logged.';
                form.reset();
            } else {
                const message = await response.text();
                status.textContent = message || 'Submission failed.';
            }
        } catch (error) {
            status.textContent = 'Server unreachable or request timed out.';
        } finally {
            btn.disabled = false;
            btn.innerText = 'Submit Claim';
        }
    });
</script>
</body>
</html>
