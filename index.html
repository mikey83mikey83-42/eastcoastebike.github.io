<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>East Coast Bafang Service Hub</title>
    <style>
        :root { --main-blue: #0056b3; --success-green: #28a745; }
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: center; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn { background: var(--main-blue); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; }
        .btn-claim { background: var(--success-green); }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h1>East Coast Bafang Service Hub</h1>
    <p>Official Warranty Repair & Parts Center</p>

    <hr>

    <h2>Parts Inventory</h2>
    <div id="inventory-list" class="grid">Loading parts...</div>

    <hr>

    <h2>File a Warranty Claim</h2>
    <form id="claimForm">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="text" id="serial" placeholder="Motor/Controller Serial Number" required>
        <textarea id="issue" placeholder="Describe the issue..." rows="4" required></textarea>
        <button type="submit" class="btn btn-claim">Submit Claim Automatically</button>
    </form>
</div>

<script>
    const BACKEND_URL = "https://your-app-name.onrender.com"; // UPDATE THIS LATER

    // Fetch Inventory Automatically
    async function loadInventory() {
        try {
            const res = await fetch(`${BACKEND_URL}/inventory`);
            const items = await res.json();
            const list = document.getElementById('inventory-list');
            list.innerHTML = items.map(item => `
                <div class="card">
                    <h3>${item.name}</h3>
                    <p>$${item.price}</p>
                    <button class="btn" onclick="buyItem('${item.id}')">Buy Now</button>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('inventory-list').innerHTML = "Error loading inventory.";
        }
    }

    // Submit Claim Automatically
    document.getElementById('claimForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            customer_name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            serial_number: document.getElementById('serial').value,
            issue_description: document.getElementById('issue').value
        };

        const res = await fetch(`${BACKEND_URL}/submit-claim`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        if (res.ok) alert("Claim submitted and logged! We'll contact you soon.");
    };

    loadInventory();

    function buyItem(id) {
        alert("Redirecting to secure checkout for item " + id);
        // Link to Stripe here
    }
</script>

</body>
</html>
