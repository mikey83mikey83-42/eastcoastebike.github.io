<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warranty Hub | East Coast E-bike</title>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        .page { padding: 30px; display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        .btn { background: #d4a017; color: black; border: none; padding: 15px; border-radius: 4px; font-weight: bold; width: 90%; max-width: 400px; cursor: pointer; }
        select, input, textarea { width: 90%; max-width: 400px; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="home" class="page active">
        <h1 style="color:#d4a017;">{{ company }}</h1>
        <p>Official Bafang Affiliate & Repair Center</p>
        <button class="btn" onclick="show('claim')">FILE WARRANTY CLAIM</button>
        <button class="btn" onclick="alert('Parts Store Opening Soon!')" style="background:#444; color:white; margin-top:20px;">SHOP EXCLUSIVE PARTS</button>
    </div>

    <div id="claim" class="page">
        <h2>Submit Warranty Claim</h2>
        <form action="/submit-claim" method="POST">
            <select name="motor_model" required>
                <option value="">Select Bafang System</option>
                <option value="M560">M560 (Heavy Assist eMTB)</option>
                <option value="M510">M510 (eMTB Performance)</option>
                <option value="M430">M430 (eCargo/eSpeed)</option>
                <option value="H730">H730 (Rear Hub - Auto 3 Speed)</option>
                <option value="M210">M210 (eCity/eTour)</option>
            </select>
            <input type="text" name="policy_num" placeholder="Policy Number / VIN" required>
            <textarea name="issue" placeholder="Details of repair needed..." rows="4"></textarea>
            <button type="submit" class="btn">SUBMIT TO EAST COAST REPAIR</button>
        </form>
        <p onclick="show('home')" style="cursor:pointer; color:#d4a017;">← Cancel</p>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
